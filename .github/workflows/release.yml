name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - run: yarn install --immutable
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: "false"

      - run: yarn lint
      - run: yarn format:check
      - run: yarn typecheck
      - run: yarn test:run

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    concurrency:
      group: release
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - run: yarn install --immutable
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: "false"

      - run: yarn release
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: "false"
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
