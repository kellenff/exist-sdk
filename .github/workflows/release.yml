name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'
          cache: 'yarn'

      - run: yarn install --immutable
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

      - run: yarn lint
      - run: yarn format:check
      - run: yarn typecheck
      - run: yarn test:run
      - run: yarn release
        env:
          DRY_RUN: 'true'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'
          cache: 'yarn'

      - run: yarn install --immutable
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

      - run: yarn release
        env:
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'
