name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Test
        run: go test $(go list ./... | grep -v '/examples/')
      - name: Vet
        run: go vet $(go list ./... | grep -v '/examples/')
      - name: Build examples
        run: go build ./examples/...
